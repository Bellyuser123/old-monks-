<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRYPTOWALLET.AI - Web3 AI Wallet Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================
           RESET & GLOBAL STYLES
        ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            background-color: #FFEA00;
            font-family: 'Space Mono', monospace;
            color: #1A1A1A;
            line-height: 1.6;
            font-size: 16px;
        }

        /* ==========================================
           SCANLINE OVERLAY (Digital aesthetic)
        ========================================== */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(
                    0deg,
                    rgba(0, 0, 0, 0.03) 0px,
                    rgba(0, 0, 0, 0.03) 1px,
                    transparent 1px,
                    transparent 2px
                );
            pointer-events: none;
            z-index: 9999;
        }

        /* ==========================================
           TYPOGRAPHY
        ========================================== */
        h1, h2, h3 {
            font-family: 'Anton', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 400;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            line-height: 1.1;
        }

        h2 {
            font-size: clamp(1.2rem, 5vw, 2rem);
        }

        /* ==========================================
           CONTAINER & LAYOUT
        ========================================== */
        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            background-color: #FFEA00;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo {
            font-size: clamp(1.5rem, 6vw, 2.5rem);
            font-family: 'Anton', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
            margin-bottom: 10px;
            position: relative;
            display: inline-block;
        }

        /* Glitchy offset shadow effect */
        .logo::before {
            content: attr(data-text);
            position: absolute;
            left: 3px;
            top: 3px;
            color: #FF6B35;
            z-index: -1;
            text-shadow: -2px -2px 0 #00FF87;
        }

        /* ==========================================
           MAIN CONTENT AREA
        ========================================== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .tagline {
            text-align: center;
            margin-bottom: 40px;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-family: 'Anton', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            line-height: 1.3;
            max-width: 600px;
        }

        .tagline-highlight {
            color: #FF6B35;
            text-decoration: underline;
            text-decoration-thickness: 3px;
            text-underline-offset: 6px;
        }

        /* ==========================================
           CARD STYLING (Neo-Brutalism)
        ========================================== */
        .card {
            background-color: #FFFFFF;
            border: 4px solid #1A1A1A;
            box-shadow: 6px 6px 0px #1A1A1A;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            transition: all 0.15s ease;
        }

        .card:hover {
            transform: translate(-3px, -3px);
            box-shadow: 9px 9px 0px #1A1A1A;
        }

        .card:active {
            transform: translate(2px, 2px);
            box-shadow: 3px 3px 0px #1A1A1A;
        }

        /* ==========================================
           TAB SWITCHER
        ========================================== */
        .tab-switcher {
            display: flex;
            margin-bottom: 30px;
            border: 3px solid #1A1A1A;
            background-color: #F0F0F0;
            gap: 0;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-right: 3px solid #1A1A1A;
            background-color: #F0F0F0;
            font-family: 'Anton', sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.15s ease;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .tab-btn:last-child {
            border-right: none;
        }

        .tab-btn.active {
            background-color: #1A1A1A;
            color: #FFEA00;
            box-shadow: inset 0 0 0 3px #1A1A1A;
        }

        .tab-btn:hover:not(.active) {
            background-color: #E0E0E0;
            transform: translateY(-2px);
        }

        /* ==========================================
           FORM ELEMENTS
        ========================================== */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-family: 'Anton', sans-serif;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 12px 14px;
            border: 3px solid #1A1A1A;
            background-color: #FFFFFF;
            font-family: 'Space Mono', monospace;
            font-size: 0.95rem;
            letter-spacing: 0.02em;
            transition: all 0.15s ease;
            box-shadow: 3px 3px 0px #1A1A1A;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="email"]:focus {
            outline: none;
            border-color: #00FF87;
            box-shadow: 0 0 0 4px rgba(0, 255, 135, 0.3), 3px 3px 0px #1A1A1A;
            transform: translate(-2px, -2px);
        }

        /* Animated blinking cursor on focus */
        input[type="text"]:focus::placeholder,
        input[type="password"]:focus::placeholder,
        input[type="email"]:focus::placeholder {
            color: transparent;
        }

        input[type="text"]::placeholder,
        input[type="password"]::placeholder,
        input[type="email"]::placeholder {
            color: #999;
            font-style: italic;
        }

        /* Error state */
        input.error {
            border-color: #FF0000 !important;
            background-color: #FFE0E0;
        }

        input.error:focus {
            box-shadow: 0 0 0 4px rgba(255, 0, 0, 0.3), 3px 3px 0px #1A1A1A;
        }

        /* Eye toggle button */
        .eye-toggle {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 4px 8px;
            transition: all 0.15s ease;
            user-select: none;
        }

        .eye-toggle:hover {
            transform: scale(1.15);
        }

        .eye-toggle:active {
            transform: scale(0.95);
        }

        /* ==========================================
           BUTTONS (Neo-Brutalism)
        ========================================== */
        button {
            font-family: 'Space Mono', monospace;
            cursor: pointer;
            transition: all 0.15s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
            border: 0;
        }

        /* Primary button */
        .btn-primary {
            width: 100%;
            padding: 14px;
            background-color: #1A1A1A;
            color: #FFFFFF;
            border: 4px solid #1A1A1A;
            box-shadow: 5px 5px 0px #1A1A1A;
            font-size: 1rem;
            margin-top: 10px;
        }

        .btn-primary:hover {
            transform: translate(-3px, -3px);
            box-shadow: 8px 8px 0px #1A1A1A;
        }

        .btn-primary:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #1A1A1A;
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #1A1A1A;
        }

        /* Secondary buttons */
        .btn-secondary {
            width: 100%;
            padding: 12px;
            background-color: #FF6B35;
            color: #FFFFFF;
            border: 3px solid #1A1A1A;
            box-shadow: 4px 4px 0px #1A1A1A;
            font-size: 0.95rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-secondary:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #1A1A1A;
            background-color: #E85A25;
        }

        .btn-secondary:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #1A1A1A;
        }

        .btn-walletconnect {
            background-color: #3B99FC;
        }

        .btn-walletconnect:hover {
            background-color: #2A7FD8;
        }

        /* ==========================================
           DIVIDER
        ========================================== */
        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            gap: 10px;
        }

        .divider-line {
            flex: 1;
            height: 2px;
            background-color: #1A1A1A;
        }

        .divider-text {
            font-family: 'Anton', sans-serif;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
            padding: 0 10px;
        }

        /* ==========================================
           FOOTER
        ========================================== */
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
            font-family: 'Space Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .footer-text {
            border: 3px solid #1A1A1A;
            padding: 12px;
            display: inline-block;
            background-color: #FFFFFF;
            box-shadow: 4px 4px 0px #1A1A1A;
        }

        /* ==========================================
           SUCCESS STATE
        ========================================== */
        .success-message {
            display: none;
            padding: 15px;
            background-color: #00FF87;
            border: 3px solid #1A1A1A;
            box-shadow: 4px 4px 0px #1A1A1A;
            margin-bottom: 20px;
            font-family: 'Space Mono', monospace;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.05em;
            animation: pulse-success 0.6s ease;
        }

        @keyframes pulse-success {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        /* ==========================================
           HIDDEN/VISIBLE STATES
        ========================================== */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ==========================================
           RESPONSIVE DESIGN (Mobile-first)
        ========================================== */
        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }

            .card {
                padding: 25px;
                border-width: 3px;
                box-shadow: 4px 4px 0px #1A1A1A;
            }

            .card:hover {
                box-shadow: 6px 6px 0px #1A1A1A;
            }

            .tagline {
                margin-bottom: 30px;
                font-size: 1.2rem;
            }

            h1 {
                font-size: 2rem;
            }

            .btn-primary,
            .btn-secondary {
                padding: 12px;
                font-size: 0.9rem;
            }

            input[type="text"],
            input[type="password"],
            input[type="email"] {
                padding: 10px 12px;
                font-size: 16px; /* Prevents zoom on iOS */
            }

            .footer-text {
                font-size: 0.75rem;
            }
        }

        @media (max-width: 768px) {
            .card {
                max-width: 100%;
            }

            .tagline {
                font-size: 1.4rem;
            }
        }

        /* ==========================================
           DARK MODE VARIANT (Optional)
        ========================================== */
        @media (prefers-color-scheme: dark) {
            /* Keep bright neo-brutalism even in dark mode */
            body {
                background-color: #FFEA00;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <div class="logo" data-text="CRYPTOWALLET.AI">CRYPTOWALLET.AI</div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main">
            <!-- HERO TAGLINE -->
            <div class="tagline">
                YOUR <span class="tagline-highlight">AI-POWERED</span> WEB3 WALLET
            </div>

            <!-- LOGIN CARD -->
            <div class="card">
                <!-- SUCCESS MESSAGE -->
                <div class="success-message" id="successMessage">
                    ✓ WALLET CONNECTED SUCCESSFULLY!
                </div>

                <!-- TAB SWITCHER -->
                <div class="tab-switcher">
                    <button class="tab-btn active" data-tab="login">Login</button>
                    <button class="tab-btn" data-tab="signup">Sign Up</button>
                </div>

                <!-- LOGIN TAB -->
                <div class="tab-content active" id="login">
                    <form id="loginForm">
                        <!-- Wallet Address Input -->
                        <div class="form-group">
                            <label for="walletAddress">Wallet Address</label>
                            <div class="input-wrapper">
                                <input 
                                    type="text" 
                                    id="walletAddress" 
                                    placeholder="0x... Enter Wallet Address"
                                    required
                                >
                            </div>
                        </div>

                        <!-- Password Input -->
                        <div class="form-group">
                            <label for="password">Password</label>
                            <div class="input-wrapper">
                                <input 
                                    type="password" 
                                    id="password" 
                                    placeholder="••••••••"
                                    required
                                >
                                <button type="button" class="eye-toggle" id="eyeToggle">
                                    👁️
                                </button>
                            </div>
                        </div>

                        <!-- Connect Wallet Button -->
                        <button type="submit" class="btn-primary" id="connectBtn">
                            CONNECT WALLET
                        </button>
                    </form>

                    <!-- Divider -->
                    <div class="divider">
                        <div class="divider-line"></div>
                        <div class="divider-text">OR</div>
                        <div class="divider-line"></div>
                    </div>

                    <!-- Social/Wallet Connect Buttons -->
                    <button class="btn-secondary" id="metamaskBtn">
                        🦊 METAMASK
                    </button>
                    <button class="btn-secondary btn-walletconnect" id="walletconnectBtn">
                        💼 WALLETCONNECT
                    </button>
                </div>

                <!-- SIGN UP TAB -->
                <div class="tab-content" id="signup">
                    <form id="signupForm">
                        <!-- Email Input -->
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <div class="input-wrapper">
                                <input 
                                    type="email" 
                                    id="email" 
                                    placeholder="user@example.com"
                                    required
                                >
                            </div>
                        </div>

                        <!-- Wallet Address Input -->
                        <div class="form-group">
                            <label for="signupWallet">Wallet Address</label>
                            <div class="input-wrapper">
                                <input 
                                    type="text" 
                                    id="signupWallet" 
                                    placeholder="0x... Enter Wallet Address"
                                    required
                                >
                            </div>
                        </div>

                        <!-- Password Input -->
                        <div class="form-group">
                            <label for="signupPassword">Password</label>
                            <div class="input-wrapper">
                                <input 
                                    type="password" 
                                    id="signupPassword" 
                                    placeholder="••••••••"
                                    required
                                >
                                <button type="button" class="eye-toggle" id="eyeToggleSignup">
                                    👁️
                                </button>
                            </div>
                        </div>

                        <!-- Confirm Password -->
                        <div class="form-group">
                            <label for="confirmPassword">Confirm Password</label>
                            <div class="input-wrapper">
                                <input 
                                    type="password" 
                                    id="confirmPassword" 
                                    placeholder="••••••••"
                                    required
                                >
                                <button type="button" class="eye-toggle" id="eyeToggleConfirm">
                                    👁️
                                </button>
                            </div>
                        </div>

                        <!-- Create Account Button -->
                        <button type="submit" class="btn-primary" id="signupBtn">
                            CREATE ACCOUNT
                        </button>
                    </form>

                    <!-- Divider -->
                    <div class="divider">
                        <div class="divider-line"></div>
                        <div class="divider-text">OR</div>
                        <div class="divider-line"></div>
                    </div>

                    <!-- Social/Wallet Connect Buttons -->
                    <button class="btn-secondary" id="metamaskBtnSignup">
                        🦊 METAMASK
                    </button>
                    <button class="btn-secondary btn-walletconnect" id="walletconnectBtnSignup">
                        💼 WALLETCONNECT
                    </button>
                </div>
            </div>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            <div class="footer-text">
                🔒 Secured by AI | ⛓️ Decentralized | ✓ No KYC
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // TAB SWITCHING
        // ==========================================
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // Remove active class from all tabs and contents
                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));

                // Add active class to clicked tab
                btn.classList.add('active');
                const tabId = btn.getAttribute('data-tab');
                document.getElementById(tabId).classList.add('active');
            });
        });

        // ==========================================
        // PASSWORD VISIBILITY TOGGLE
        // ==========================================
        const eyeToggles = {
            login: document.getElementById('eyeToggle'),
            signup: document.getElementById('eyeToggleSignup'),
            confirm: document.getElementById('eyeToggleConfirm')
        };

        const passwordInputs = {
            login: document.getElementById('password'),
            signup: document.getElementById('signupPassword'),
            confirm: document.getElementById('confirmPassword')
        };

        function setupEyeToggle(toggle, input) {
            if (!toggle || !input) return;

            toggle.addEventListener('click', (e) => {
                e.preventDefault();
                const isPassword = input.type === 'password';
                input.type = isPassword ? 'text' : 'password';
                toggle.textContent = isPassword ? '🙈' : '👁️';
            });
        }

        setupEyeToggle(eyeToggles.login, passwordInputs.login);
        setupEyeToggle(eyeToggles.signup, passwordInputs.signup);
        setupEyeToggle(eyeToggles.confirm, passwordInputs.confirm);

        // ==========================================
        // INPUT VALIDATION
        // ==========================================
        function validateWalletAddress(address) {
            // Simple Ethereum address validation (0x + 40 hex chars)
            return /^0x[a-fA-F0-9]{40}$/.test(address);
        }

        function validatePassword(password) {
            // At least 8 characters
            return password.length >= 8;
        }

        function validateEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function setInputError(input, hasError) {
            if (hasError) {
                input.classList.add('error');
            } else {
                input.classList.remove('error');
            }
        }

        // ==========================================
        // LOGIN FORM HANDLER
        // ==========================================
        const loginForm = document.getElementById('loginForm');
        const connectBtn = document.getElementById('connectBtn');
        const walletAddressInput = document.getElementById('walletAddress');
        const passwordInput = document.getElementById('password');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const walletAddress = walletAddressInput.value.trim();
            const password = passwordInput.value;
            let hasError = false;

            // Validate wallet address
            if (!validateWalletAddress(walletAddress)) {
                setInputError(walletAddressInput, true);
                hasError = true;
            } else {
                setInputError(walletAddressInput, false);
            }

            // Validate password
            if (!validatePassword(password)) {
                setInputError(passwordInput, true);
                hasError = true;
            } else {
                setInputError(passwordInput, false);
            }

            if (!hasError) {
                simulateConnection();
            }
        });

        // ==========================================
        // SIGN UP FORM HANDLER
        // ==========================================
        const signupForm = document.getElementById('signupForm');
        const signupBtn = document.getElementById('signupBtn');
        const emailInput = document.getElementById('email');
        const signupWalletInput = document.getElementById('signupWallet');
        const signupPasswordInput = document.getElementById('signupPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');

        signupForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const email = emailInput.value.trim();
            const walletAddress = signupWalletInput.value.trim();
            const password = signupPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            let hasError = false;

            // Validate email
            if (!validateEmail(email)) {
                setInputError(emailInput, true);
                hasError = true;
            } else {
                setInputError(emailInput, false);
            }

            // Validate wallet address
            if (!validateWalletAddress(walletAddress)) {
                setInputError(signupWalletInput, true);
                hasError = true;
            } else {
                setInputError(signupWalletInput, false);
            }

            // Validate password
            if (!validatePassword(password)) {
                setInputError(signupPasswordInput, true);
                hasError = true;
            } else {
                setInputError(signupPasswordInput, false);
            }

            // Check if passwords match
            if (password !== confirmPassword) {
                setInputError(confirmPasswordInput, true);
                hasError = true;
            } else {
                setInputError(confirmPasswordInput, false);
            }

            if (!hasError) {
                simulateConnection();
            }
        });

        // ==========================================
        // CONNECTION SIMULATION
        // ==========================================
        function simulateConnection() {
            connectBtn.disabled = true;
            connectBtn.textContent = 'CONNECTING...';
            signupBtn.disabled = true;
            signupBtn.textContent = 'CREATING...';

            // Simulate 2-second connection delay
            setTimeout(() => {
                showSuccessMessage();
                resetForms();
                connectBtn.disabled = false;
                connectBtn.textContent = 'CONNECT WALLET';
                signupBtn.disabled = false;
                signupBtn.textContent = 'CREATE ACCOUNT';
            }, 2000);
        }

        function showSuccessMessage() {
            const successMsg = document.getElementById('successMessage');
            successMsg.style.display = 'block';

            // Auto-hide after 3 seconds
            setTimeout(() => {
                successMsg.style.display = 'none';
            }, 3000);
        }

        function resetForms() {
            loginForm.reset();
            signupForm.reset();

            // Clear error states
            document.querySelectorAll('input').forEach(input => {
                setInputError(input, false);
            });

            // Reset password visibility
            passwordInputs.login.type = 'password';
            passwordInputs.signup.type = 'password';
            passwordInputs.confirm.type = 'password';
            eyeToggles.login.textContent = '👁️';
            eyeToggles.signup.textContent = '👁️';
            eyeToggles.confirm.textContent = '👁️';
        }

        // ==========================================
        // WALLET CONNECTION BUTTONS
        // ==========================================
        document.getElementById('metamaskBtn').addEventListener('click', () => {
            alert('🦊 MetaMask connection would be initiated here!\nIn production, this would call: window.ethereum.request({ method: "eth_requestAccounts" })');
        });

        document.getElementById('walletconnectBtn').addEventListener('click', () => {
            alert('💼 WalletConnect dialog would appear here!\nIn production, this would integrate with WalletConnect SDK');
        });

        document.getElementById('metamaskBtnSignup').addEventListener('click', () => {
            alert('🦊 MetaMask connection would be initiated here!\nIn production, this would call: window.ethereum.request({ method: "eth_requestAccounts" })');
        });

        document.getElementById('walletconnectBtnSignup').addEventListener('click', () => {
            alert('💼 WalletConnect dialog would appear here!\nIn production, this would integrate with WalletConnect SDK');
        });

        // ==========================================
        // ENHANCED INPUT VALIDATION FEEDBACK
        // ==========================================
        // Real-time wallet address validation
        walletAddressInput.addEventListener('blur', () => {
            if (walletAddressInput.value && !validateWalletAddress(walletAddressInput.value)) {
                setInputError(walletAddressInput, true);
            } else {
                setInputError(walletAddressInput, false);
            }
        });

        signupWalletInput.addEventListener('blur', () => {
            if (signupWalletInput.value && !validateWalletAddress(signupWalletInput.value)) {
                setInputError(signupWalletInput, true);
            } else {
                setInputError(signupWalletInput, false);
            }
        });

        // Real-time password validation
        passwordInput.addEventListener('input', () => {
            if (passwordInput.value && !validatePassword(passwordInput.value)) {
                setInputError(passwordInput, true);
            } else {
                setInputError(passwordInput, false);
            }
        });

        // Real-time sign-up password validation
        signupPasswordInput.addEventListener('input', () => {
            if (signupPasswordInput.value && !validatePassword(signupPasswordInput.value)) {
                setInputError(signupPasswordInput, true);
            } else {
                setInputError(signupPasswordInput, false);
            }

            // Also check confirm password match
            if (confirmPasswordInput.value && signupPasswordInput.value !== confirmPasswordInput.value) {
                setInputError(confirmPasswordInput, true);
            } else {
                setInputError(confirmPasswordInput, false);
            }
        });

        confirmPasswordInput.addEventListener('input', () => {
            if (confirmPasswordInput.value && signupPasswordInput.value !== confirmPasswordInput.value) {
                setInputError(confirmPasswordInput, true);
            } else {
                setInputError(confirmPasswordInput, false);
            }
        });

        // Real-time email validation
        emailInput.addEventListener('blur', () => {
            if (emailInput.value && !validateEmail(emailInput.value)) {
                setInputError(emailInput, true);
            } else {
                setInputError(emailInput, false);
            }
        });

        // Clear errors on input focus
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                if (input.classList.contains('error')) {
                    input.classList.remove('error');
                }
            });
        });
    </script>
</body>
</html>
